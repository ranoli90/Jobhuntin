<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to $app_name</title>
  <style>
    @media only screen and (max-width: 600px) {
      .container { width: 100% !important; }
      .content { padding: 32px 24px !important; }
      .button { width: 100% !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #0a0a0a;">
  
  <!-- Hidden preheader -->
  <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">
    Your sign-in link for $app_name — expires in $expires_minutes minutes
  </div>
  
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #0a0a0a;">
    <tr>
      <td align="center" style="padding: 60px 20px;">
        
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" class="container" style="background-color: #111111; border: 1px solid #1a1a1a;">
          
          <!-- Logo -->
          <tr>
            <td class="content" style="padding: 48px 48px 32px;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="vertical-align: middle;">
                    <div style="width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%;"></div>
                  </td>
                  <td style="padding-left: 12px; vertical-align: middle;">
                    <span style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 18px; font-weight: 500; color: #fafafa; letter-spacing: -0.02em;">$app_name</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <!-- Headline -->
          <tr>
            <td class="content" style="padding: 0 48px 24px;">
              <h1 style="margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 28px; font-weight: 500; color: #fafafa; line-height: 1.2;">
                Sign in
              </h1>
            </td>
          </tr>
          
          <!-- Body -->
          <tr>
            <td class="content" style="padding: 0 48px 32px;">
              <p style="margin: 0 0 24px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; color: #a1a1aa; line-height: 1.6;">
                Click the button below to access your account. This link will expire in $expires_minutes minutes.
              </p>
              
              <!-- Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td>
                    <a href="$action_link" class="button" style="display: block; padding: 16px 24px; background-color: #22c55e; color: #000000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 15px; font-weight: 500; text-decoration: none; text-align: center;">
                      Sign in to $app_name
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
              <!-- Security note -->
          <tr>
            <td class="content" style="padding: 0 48px 48px;">
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border-top: 1px solid #1a1a1a;">
                <tr>
                  <td style="padding-top: 24px;">
                    <p style="margin: 0 0 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 13px; color: #52525b; line-height: 1.5;">
                      Didn't request this? You can safely ignore this email.
                    </p>
                    <p style="margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; color: #3f3f46; word-break: break-all;">
                      $display_link
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
        </table>
        
      </td>
    </tr>
  </table>
  
</body>
</html>
