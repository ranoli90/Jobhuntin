<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #F7F6F3; color: #2D2A26; }
    .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
    .card { background: #ffffff; border-radius: 16px; padding: 32px; box-shadow: 0 4px 24px rgba(45,42,38,0.08); border: 1px solid rgba(45,42,38,0.06); }
    .logo { font-size: 20px; font-weight: 700; color: #2D2A26; margin-bottom: 24px; }
    .btn { display: inline-block; background: #455DD3; color: #ffffff; padding: 14px 28px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    .footer { text-align: center; margin-top: 32px; font-size: 12px; color: #9B9A97; }
    .footer a { color: #787774; }
    h1 { font-size: 24px; margin: 0 0 16px; color: #2D2A26; }
    p { line-height: 1.6; margin: 0 0 16px; color: #787774; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">JobHuntin</div>
      $CONTENT
    </div>
    <div class="footer">
      <p>&copy; 2026 JobHuntin. All rights reserved.</p>
      <p>
        <a href="https://jobhuntin.com/privacy">Privacy</a> &middot;
        <a href="https://jobhuntin.com/terms">Terms</a> &middot;
        <a href="https://jobhuntin.com/privacy#ccpa">Do Not Sell My Info</a>
      </p>
      <p><a href="$UNSUBSCRIBE_URL">Unsubscribe</a> from these emails.</p>
    </div>
  </div>
</body>
</html>
