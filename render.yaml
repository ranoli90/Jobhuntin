# Render Blueprint for the entire JobHuntin platform
# This single file is now the **only** source of truth for Render deployments.

services:
  # ─────────────────────────────────────────────────────────────────────────
  # API Services
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: jobhuntin-api
    env: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: prod
      - key: PYTHONPATH
        value: apps:packages:.
      - key: STORAGE_TYPE
        value: render_disk
      - key: APP_BASE_URL
        value: https://jobhuntin-web.onrender.com
      - key: API_PUBLIC_URL
        value: https://jobhuntin-api.onrender.com
      # MAGIC_LINK_BIND_TO_IP: "false"  # Removed - defaults to true in prod via apply_env_defaults()
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemini-2.0-flash
      - key: EMAIL_FROM
        value: JobHuntin <noreply@jobhuntin.com>
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          name: jobhuntin-redis
          type: keyvalue
          property: connectionString
      - key: LLM_API_KEY
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEBHOOK_SIGNING_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false

  - type: web
    name: jobhuntin-api-staging
    env: docker
    plan: starter
    region: oregon
    branch: staging
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: staging
      - key: PYTHONPATH
        value: apps:packages:.
      - key: STORAGE_TYPE
        value: render_disk
      - key: APP_BASE_URL
        value: https://staging.jobhuntin.com
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          name: jobhuntin-redis
          type: keyvalue
          property: connectionString
      - key: LLM_API_KEY
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEBHOOK_SIGNING_SECRET
        sync: false

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend Surfaces
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: jobhuntin-web
    env: static
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && cd apps/web && npx playwright install chromium && npm run build && cp dist/index.html dist/200.html
    staticPublishPath: apps/web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /200.html
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        value: https://jobhuntin-api.onrender.com
      - key: VITE_APP_BASE_URL
        value: https://jobhuntin-web.onrender.com

  - type: web
    name: jobhuntin-admin
    env: static
    plan: starter
    region: oregon
    branch: main
    buildCommand: cd apps/web-admin && npm install && npm run build
    staticPublishPath: apps/web-admin/dist
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        value: https://jobhuntin-api.onrender.com

  # ─────────────────────────────────────────────────────────────────────────
  # Workers
  # ─────────────────────────────────────────────────────────────────────────
  - type: worker
    name: jobhuntin-seo-engine
    env: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci && cd apps/web && npm ls tsx && npx playwright install chromium
    startCommand: cd apps/web && node --import tsx scripts/seo/modern-seo-engine.ts
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: GOOGLE_SEARCH_CONSOLE_SITE
        value: https://jobhuntin-web.onrender.com
      - key: SEO_PARALLEL_WORKERS
        value: "5"
      - key: SEO_DAILY_LIMIT
        value: "500"
      - key: SEO_BATCH_SIZE
        value: "20"
      - key: SEO_BATCH_DELAY_MS
        value: "10000"
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: openai/gpt-4o-mini
      - key: LLM_MODEL_RESEARCH
        value: anthropic/claude-3-haiku
      - key: LLM_MODEL_OPTIMIZATION
        value: google/gemini-flash-1.5
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          name: jobhuntin-redis
          type: keyvalue
          property: connectionString
      - key: LLM_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: GSC_API_KEY
        sync: false
      - key: INDEXNOW_API_KEY
        sync: false

  - type: worker
    name: jobhuntin-job-sync
    env: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=apps:packages:. python apps/worker/job_sync_worker.py
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: ENV
        value: prod
      - key: PYTHONPATH
        value: apps:packages:.

  - type: worker
    name: jobhuntin-job-queue
    env: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=apps:packages:. python apps/worker/job_queue_worker.py
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: ENV
        value: prod
      - key: PYTHONPATH
        value: apps:packages:.

  - type: worker
    name: jobhuntin-follow-up-reminders
    env: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=apps:packages:. python apps/worker/follow_up_reminders_worker.py
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: ENV
        value: prod
      - key: PYTHONPATH
        value: apps:packages:.

  - type: worker
    name: sorce-auto-apply-agent
    env: python
    plan: standard
    region: oregon
    numInstances: 2
    branch: main
    buildCommand: pip install -r requirements.txt && python -m playwright install --with-deps chromium
    startCommand: python -m apps.worker.startup --instances 2
    healthCheckPath: /worker/health
    healthCheckTimeout: 30
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PYTHONPATH
        value: apps:packages:.
      - key: STORAGE_TYPE
        value: render_disk
      - key: APP_BASE_URL
        value: https://jobhuntin-web.onrender.com
      - key: AGENT_ENABLED
        value: "true"
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: MAX_INSTANCES
        value: "20"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: BROWSER_CONTEXT_MAX_USES
        value: "10"
      - key: POLL_INTERVAL_SECONDS
        value: "2"
      - key: LOG_LEVEL
        value: INFO
      - key: WORKER_TIMEOUT_SECONDS
        value: "300"
      - key: ENABLE_METRICS
        value: "true"
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemini-2.0-flash
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          name: jobhuntin-redis
          type: keyvalue
          property: connectionString
      - key: LLM_API_KEY
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: WEBHOOK_SIGNING_SECRET
        sync: false

  # ─────────────────────────────────────────────────────────────────────────
  # Cron Jobs
  # ─────────────────────────────────────────────────────────────────────────
  - type: cron
    name: jobhuntin-job-alerts-daily
    env: python
    region: oregon
    schedule: "0 14 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=apps:packages:. ALERT_FREQUENCY=daily python scripts/cron/process_job_alerts.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: ENV
        value: prod
      - key: ALERT_FREQUENCY
        value: daily
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_FROM
        value: noreply@jobhuntin.com

  - type: cron
    name: jobhuntin-job-alerts-weekly
    env: python
    region: oregon
    schedule: "0 15 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=apps:packages:. ALERT_FREQUENCY=weekly python scripts/cron/process_job_alerts.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: ENV
        value: prod
      - key: ALERT_FREQUENCY
        value: weekly
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_FROM
        value: noreply@jobhuntin.com

  - type: cron
    name: jobhuntin-weekly-digest
    env: python
    region: oregon
    schedule: "0 9 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=apps:packages:. python scripts/cron/run_weekly_digest.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: ENV
        value: prod
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_FROM
        value: noreply@jobhuntin.com

databases:
  - name: jobhuntin-db
    databaseName: jobhuntin
    user: jobhuntin_user
    plan: basic_256mb
    region: oregon
    ipAllowList:
      - source: 10.0.0.0/8
        description: Render private network (internal services only)
      - source: 100.64.0.0/10
        description: Render private network (internal services only)

keyValueStores:
  - name: jobhuntin-redis
    plan: free
    region: oregon
    maxMemoryPolicy: allkeys-lru

# Usage:
#   render login              # once per environment or export RENDER_API_KEY
#   render blueprint validate # optional linting step
#   render blueprint apply render.yaml
