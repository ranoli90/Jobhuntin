# Render Deployment Configuration for SEO Ranking Engine
# This file configures your automated SEO system to deploy with your backend

services:
  # Web Application (Frontend)
  - type: web
    name: jobhuntin-web
    env: node
    buildCommand: cd apps/web && npm ci && npm run build
    startCommand: cd apps/web && npm run seo:backend
    envVars:
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false  # Set in Render dashboard
      - key: GOOGLE_SEARCH_CONSOLE_SITE
        value: https://jobhuntin.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20  # Fix for npm ci segfault (exit status 139)
      - key: LLM_API_KEY
        sync: false  # OpenRouter API Key for free NVIDIA models
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemma-2-9b-it:free
    healthCheckPath: /api/seo-health
    autoDeploy: true
    
  # API Backend
  - type: web
    name: jobhuntin-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m apps.api.main
    envVars:
      - key: DATABASE_URL
        value: postgresql://dpg-d66ck524d50c73bas62g-a:60BpsY53MYOO4fGFlvZKwDpiXB9Up9lL@dpg-d66ck524d50c73bas62g-a.oregon-postgres.render.com/dpg-d66ck524d50c73bas62g
      - key: LLM_API_KEY
        sync: false  # OpenRouter API Key for free NVIDIA models
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemma-2-9b-it:free
      - key: ENV
        value: production
      - key: STORAGE_TYPE
        value: render_disk
      - key: APP_BASE_URL
        value: https://api.jobhuntin.com
      - key: CSRF_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard
      - key: WEBHOOK_SIGNING_SECRET
        sync: false  # Set in Render dashboard
    healthCheckPath: /healthz
    autoDeploy: true
    
  # Background Worker (SEO Engine)
  - type: worker
    name: jobhuntin-seo-engine
    env: node
    buildCommand: cd apps/web && npm ci
    startCommand: cd apps/web && npm run seo:engine
    envVars:
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false  # Set in Render dashboard
      - key: GOOGLE_SEARCH_CONSOLE_SITE
        value: https://jobhuntin.com
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20  # Fix for npm ci segfault (exit status 139)
      - key: LLM_API_KEY
        sync: false  # OpenRouter API Key for free NVIDIA models
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemma-2-9b-it:free
    autoDeploy: true

  # Background Worker (Auto-Apply Agent)
  - type: worker
    name: sorce-auto-apply-agent
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python -m apps.worker.scaling --instances 2
    envVars:
      - key: DATABASE_URL
        value: postgresql://dpg-d66ck524d50c73bas62g-a:60BpsY53MYOO4fGFlvZKwDpiXB9Up9lL@dpg-d66ck524d50c73bas62g-a.oregon-postgres.render.com/dpg-d66ck524d50c73bas62g
      - key: LLM_API_KEY
        sync: false  # OpenRouter API Key for free NVIDIA models
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemma-2-9b-it:free
      - key: AGENT_ENABLED
        value: true
      - key: ENV
        value: production
      - key: STORAGE_TYPE
        value: render_disk
      - key: APP_BASE_URL
        value: https://api.jobhuntin.com
      - key: CSRF_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard
      - key: WEBHOOK_SIGNING_SECRET
        sync: false  # Set in Render dashboard
    autoDeploy: true

# Environment Variables Setup Instructions:
# 1. Go to your Render dashboard
# 2. Add these environment variables to each service:
#
# For Web Service:
# - GOOGLE_SERVICE_ACCOUNT_KEY: Paste your entire service account JSON
# - GOOGLE_SEARCH_CONSOLE_SITE: https://jobhuntin.com
#
# For API Service:
# - DATABASE_URL: Your PostgreSQL connection string
#
# For SEO Worker:
# - GOOGLE_SERVICE_ACCOUNT_KEY: Same as web service
# - GOOGLE_SEARCH_CONSOLE_SITE: Same as web service

# Deployment Commands:
# Install Render CLI: curl https://render.com/docs/install.sh | sh
# Deploy: render deploy
# Check status: render services