# Render Deployment Configuration for SEO Ranking Engine
# This file configures your automated SEO system to deploy with your backend

services:
  # Web Application (Frontend) — Static Site
  - type: web
    name: jobhuntin-web
    env: static
    buildCommand: cd apps/web && npm ci && npx playwright install chromium && npm run build && cp dist/index.html dist/200.html
    staticPublishPath: apps/web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /200.html
    envVars:
      - key: NODE_VERSION
        value: 20  # Fix for npm ci segfault (exit status 139)
      - key: VITE_API_URL
        value: https://sorce-api.onrender.com
      - key: VITE_APP_BASE_URL
        value: https://sorce-web.onrender.com
    autoDeploy: true
    
  # API Backend
  - type: web
    name: jobhuntin-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 2 --log-level info
    envVars:
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard - NEVER hardcode credentials
      - key: DATABASE_READ_URL
        sync: false  # Set in Render dashboard for read replicas
      - key: LLM_API_KEY
        sync: false  # OpenRouter API Key for free NVIDIA models
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemini-2.0-flash
      - key: ENV
        value: production
      - key: STORAGE_TYPE
        value: render_disk
      - key: APP_BASE_URL
        value: https://sorce-web.onrender.com
      - key: CSRF_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard
      - key: WEBHOOK_SIGNING_SECRET
        sync: false  # Set in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false  # Set in Render dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false  # Set in Render dashboard
      - key: REDIS_URL
        sync: false  # Set in Render dashboard for caching
      - key: RESEND_API_KEY
        sync: false  # Resend API key for magic link emails
      - key: RESEND_WEBHOOK_SECRET
        sync: false  # Resend webhook signing secret (optional)
      - key: RECAPTCHA_SECRET_KEY
        sync: false  # Google reCAPTCHA v3 secret key
      - key: EMAIL_FROM
        value: JobHuntin <noreply@jobhuntin.com>
      - key: API_PUBLIC_URL
        value: https://sorce-api.onrender.com
    healthCheckPath: /health
    autoDeploy: true
    
  # Background Worker (Modern SEO Engine 2024)
  - type: worker
    name: jobhuntin-seo-engine
    env: node
    buildCommand: cd apps/web && npm ci
    startCommand: cd apps/web && npx tsx scripts/seo/modern-seo-engine.ts
    envVars:
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false  # Set in Render dashboard
      - key: GOOGLE_SEARCH_CONSOLE_SITE
        value: https://sorce-web.onrender.com
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      # AI Models for different content types
      - key: LLM_API_KEY
        sync: false  # OpenRouter API Key
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: openai/gpt-4o-mini  # Main content generation
      - key: LLM_MODEL_RESEARCH
        value: anthropic/claude-3-haiku  # Fast research
      - key: LLM_MODEL_OPTIMIZATION
        value: google/gemini-flash-1.5  # Title/meta optimization
      # SEO Engine Configuration
      - key: SEO_PARALLEL_WORKERS
        value: "5"
      - key: SEO_DAILY_LIMIT
        value: "500"
      - key: SEO_BATCH_SIZE
        value: "20"
      - key: SEO_BATCH_DELAY_MS
        value: "10000"
      - key: DATABASE_URL
        sync: false  # For progress tracking - NEVER hardcode
      - key: REDIS_URL
        sync: false  # For caching SEO results
      # Search Console API
      - key: GSC_API_KEY
        sync: false
      # IndexNow API
      - key: INDEXNOW_API_KEY
        sync: false
    autoDeploy: true

  # Background Worker (Auto-Apply Agent)
  - type: worker
    name: sorce-auto-apply-agent
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python -m apps.worker.scaling --instances 2
    envVars:
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard - NEVER hardcode credentials
      - key: DATABASE_READ_URL
        sync: false  # Set in Render dashboard for read operations
      - key: LLM_API_KEY
        sync: false  # OpenRouter API Key for free NVIDIA models
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemini-2.0-flash
      - key: AGENT_ENABLED
        value: true
      - key: ENV
        value: production
      - key: STORAGE_TYPE
        value: render_disk
      - key: APP_BASE_URL
        value: https://sorce-web.onrender.com
      - key: CSRF_SECRET
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set in Render dashboard
      - key: WEBHOOK_SIGNING_SECRET
        sync: false  # Set in Render dashboard
      - key: REDIS_URL
        sync: false  # For caching worker results
    autoDeploy: true

# Environment Variables Setup Instructions:
# 1. Go to your Render dashboard
# 2. Add these environment variables to each service:
#
# For Web Service:
# - GOOGLE_SERVICE_ACCOUNT_KEY: Paste your entire service account JSON
# - GOOGLE_SEARCH_CONSOLE_SITE: https://jobhuntin.com
#
# For API Service:
# - DATABASE_URL: Your PostgreSQL connection string
#
# For SEO Worker:
# - GOOGLE_SERVICE_ACCOUNT_KEY: Same as web service
# - GOOGLE_SEARCH_CONSOLE_SITE: Same as web service

# Deployment Commands:
# Install Render CLI: curl https://render.com/docs/install.sh | sh
# Deploy: render deploy
# Check status: render services