services:
  # ── FastAPI Backend (API) ──────────────────────────────────
  - type: web
    name: sorce-api
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerTarget: api
    repo: https://github.com/ranoli90/sorce
    branch: main
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        value: https://zglovpfwyobbbaaocawz.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: resumes
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: google/gemma-2-9b-it:free
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        value: price_1SyCGDFZF27VelA7tk9UQEos
      - key: STRIPE_TEAM_BASE_PRICE_ID
        value: price_1SyCGDFZF27VelA70XiRTwvx
      - key: STRIPE_TEAM_SEAT_PRICE_ID
        value: price_1SyCGEFZF27VelA70HPyVEoz
      - key: STRIPE_ENTERPRISE_PRICE_ID
        value: price_1SyCGDFZF27VelA7Iv7AnynR
      - key: STRIPE_PRO_ANNUAL_PRICE_ID
        value: price_1SyCGDFZF27VelA7km8z6pRq
      - key: STRIPE_TEAM_ANNUAL_PRICE_ID
        value: price_1SyCGEFZF27VelA7hBAzsH02
      - key: STRIPE_ENTERPRISE_ANNUAL_PRICE_ID
        value: price_1SyCGEFZF27VelA7bJNYVx8B
      - key: API_V2_PRO_PRICE_ID
        value: price_1SyCGEFZF27VelA7lHr9KhPh
      - key: API_V2_METERED_PRICE_ID
        value: price_1SyCHHFZF27VelA7G43q2L3t
      - key: ADZUNA_APP_ID
        value: feca1a79
      - key: ADZUNA_API_KEY
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: WEBHOOK_SIGNING_SECRET
        sync: false
      - key: AGENT_ENABLED
        value: "true"
      - key: LOG_JSON
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: APP_BASE_URL
        value: https://jobhuntin.com
      - key: RESEND_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: sorce-redis
          property: connectionString
    plan: starter
    region: ohio

  # ── Background Worker (Agent) ──────────────────────────────
  - type: worker
    name: sorce-worker
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerTarget: worker
    repo: https://github.com/ranoli90/sorce
    branch: main
    envVars:
      - key: ENV
        value: prod
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        value: https://zglovpfwyobbbaaocawz.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: resumes
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: google/gemma-2-9b-it:free
      - key: ADZUNA_APP_ID
        value: feca1a79
      - key: ADZUNA_API_KEY
        sync: false
      - key: AGENT_ENABLED
        value: "true"
      - key: LOG_JSON
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: PLAYWRIGHT_BROWSER_TYPE
        value: chromium
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: REDIS_URL
        fromService:
          type: redis
          name: sorce-redis
          property: connectionString
    plan: starter
    region: ohio

  # ── Web Frontend (Main App) ────────────────────────────────
  - type: web
    name: sorce-web
    runtime: static
    repo: https://github.com/ranoli90/sorce
    branch: main
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sorce-api.onrender.com
      - key: VITE_SUPABASE_URL
        value: https://zglovpfwyobbbaaocawz.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_GOOGLE_API_KEY
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Web Admin Frontend ─────────────────────────────────────
  - type: web
    name: sorce-admin
    runtime: static
    repo: https://github.com/ranoli90/sorce
    branch: main
    rootDir: apps/web-admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://sorce-api.onrender.com
      - key: VITE_SUPABASE_URL
        value: https://zglovpfwyobbbaaocawz.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

        destination: /index.html

  # ── Redis Cache ────────────────────────────────────────────
  - type: redis
    name: sorce-redis
    region: ohio
    plan: starter

databases:
  - name: sorce-db
    plan: starter
    region: ohio
