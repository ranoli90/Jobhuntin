# Render Blueprint - Infrastructure as Code
# This file defines all services for the JobHuntin platform
# Deploy with: render blueprint apply render-blueprint.yaml

services:
  # ─────────────────────────────────────────────────────────────────────────
  # API Service (Production)
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: jobhuntin-api
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    branch: main
    healthCheckPath: /health
    numInstances: 1
    disk:
      name: storage
      mountPath: /opt/render/project/data/storage
      sizeGB: 1
    envVars:
      - key: ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          name: jobhuntin-redis
          type: keyvalue
          property: internalConnectionString
      - key: JWT_SECRET
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: WEBHOOK_SIGNING_SECRET
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: google/gemini-2.0-flash
      - key: APP_BASE_URL
        value: https://jobhuntin.com
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"
      - key: STORAGE_TYPE
        value: render_disk
      - key: RENDER_DISK_PATH
        value: /opt/render/project/data/storage

  # ─────────────────────────────────────────────────────────────────────────
  # Web Frontend (Production)
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: jobhuntin-web
    env: static
    region: oregon
    plan: free
    branch: main
    buildCommand: cd apps/web && npm install && npm run build
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /200.html

  # ─────────────────────────────────────────────────────────────────────────
  # API Service (Staging)
  # ─────────────────────────────────────────────────────────────────────────
  - type: web
    name: jobhuntin-api-staging
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    branch: staging
    healthCheckPath: /health
    numInstances: 1
    disk:
      name: storage
      mountPath: /opt/render/project/data/storage
      sizeGB: 1
    envVars:
      - key: ENV
        value: staging
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          name: jobhuntin-redis
          type: keyvalue
          property: internalConnectionString
      - key: JWT_SECRET
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: WEBHOOK_SIGNING_SECRET
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: APP_BASE_URL
        value: https://staging.jobhuntin.com
      - key: STORAGE_TYPE
        value: render_disk
      - key: RENDER_DISK_PATH
        value: /opt/render/project/data/storage

  # ─────────────────────────────────────────────────────────────────────────
  # SEO Worker (Background)
  # ─────────────────────────────────────────────────────────────────────────
  - type: worker
    name: jobhuntin-seo-engine
    env: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    branch: main
    numInstances: 1
    envVars:
      - key: ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: jobhuntin-db
          property: internalConnectionString
      - key: REDIS_URL
        fromService:
          name: jobhuntin-redis
          type: keyvalue
          property: internalConnectionString

# ───────────────────────────────────────────────────────────────────────────
# Databases
# ───────────────────────────────────────────────────────────────────────────
databases:
  - name: jobhuntin-db
    region: oregon
    plan: basic_256mb
    user: jobhuntin_user
    databaseName: jobhuntin
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (Render services)

# ───────────────────────────────────────────────────────────────────────────
# Redis
# ───────────────────────────────────────────────────────────────────────────
  - name: jobhuntin-redis
    type: keyvalue
    region: oregon
    plan: free
    maxMemoryPolicy: allkeys-lru
