<!doctype html>
<html lang="en" class="scroll-smooth" suppressHydrationWarning>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobHuntin — The Application Engine That Runs While You Sleep</title>
  <meta name="description"
    content="Upload your resume. Our platform tailors every application and submits to hundreds of jobs daily." />

  <!-- Google tag (gtag.js) - consent mode: analytics denied until user accepts -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P1QLYH3M13"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    // Default: deny analytics and ads until cookie consent is given (GDPR / Consent Mode v2)
    gtag('consent', 'default', {
      'analytics_storage': 'denied',
      'ad_storage': 'denied',
      'ad_user_data': 'denied',
      'ad_personalization': 'denied'
    });
    gtag('config', 'G-P1QLYH3M13');
  </script>

  <!-- Preconnect to critical domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="JobHuntin">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

  <!-- Fonts - media=print + swap to reduce render-blocking (SEO #26) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'"
    crossorigin="anonymous">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" crossorigin="anonymous"></noscript>

  <!-- Open Graph / Social Media Fallback (for crawlers that don't execute JS like iMessage, Slack, Discord) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://jobhuntin.com" />
  <meta property="og:title" content="JobHuntin — The Application Engine That Runs While You Sleep" />
  <meta property="og:description"
    content="Upload your resume. Our platform tailors every application and submits to hundreds of jobs daily." />
  <meta property="og:image" content="https://jobhuntin.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="JobHuntin - The Application Engine That Runs While You Sleep" />
  <meta property="og:site_name" content="JobHuntin" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@jobhuntin" />
  <meta name="twitter:title" content="JobHuntin — The Application Engine That Runs While You Sleep" />
  <meta name="twitter:description"
    content="Upload your resume. Our platform tailors every application and submits to hundreds of jobs daily." />
  <meta name="twitter:image" content="https://jobhuntin.com/og-image.png" />
  <meta name="theme-color" content="#455DD3" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <!-- I5: Set lang and direction from locale (en, fr, etc.) -->
  <script>
    (function () {
      const lang = (navigator.language || navigator.userLanguage || 'en').split('-')[0];
      const supportedLang = ['en', 'fr'].includes(lang) ? lang : 'en';

      // Set language
      document.documentElement.lang = supportedLang;

      // Set direction for RTL languages
      const rtlLanguages = ['ar', 'he', 'fa', 'ur', 'ps', 'yi'];
      const direction = rtlLanguages.includes(supportedLang) ? 'rtl' : 'ltr';
      document.documentElement.dir = direction;
    })();
  </script>
  <!-- Dark mode: apply class based on system preference; user override in localStorage -->
  <script>
    (function () {
      const stored = localStorage.getItem('jobhuntin-theme');
      const dark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', dark);
    })();
  </script>
  <!-- Security: upgrade-insecure-requests. HSTS must be set by server (not meta). -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
</head>

<body class="bg-white text-gray-900">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
