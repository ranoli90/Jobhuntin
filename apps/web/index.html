<!doctype html>
<html lang="en" class="scroll-smooth" suppressHydrationWarning>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobHuntin | AI Job Search Automation & Auto-Apply</title>
  <meta name="description"
    content="Land your dream job with JobHuntin. Our AI agent swipes, tailors your resume, and auto-applies to 100s of jobs daily. Built for high-volume, high-quality hunting." />

  <!-- Google tag (gtag.js) - consent mode: analytics denied until user accepts -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P1QLYH3M13"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    // Default: deny analytics until cookie consent is given (GDPR)
    gtag('consent', 'default', {
      'analytics_storage': 'denied',
      'ad_storage': 'denied'
    });
    gtag('config', 'G-P1QLYH3M13');
  </script>

  <!-- Preconnect to critical domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com">

  <!-- Fonts - preload for LCP (P1) -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Instrument+Serif:ital@0;1&display=swap" as="style">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
    crossorigin>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <!-- I5: Set lang from locale (en, fr, etc.) -->
  <script>
    (function() {
      const lang = (navigator.language || navigator.userLanguage || 'en').split('-')[0];
      document.documentElement.lang = ['en','fr'].includes(lang) ? lang : 'en';
    })();
  </script>
  <!-- Dark mode: apply class based on system preference; user override in localStorage -->
  <script>
    (function() {
      const stored = localStorage.getItem('jobhuntin-theme');
      const dark = stored === 'dark' || (stored !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', dark);
    })();
  </script>
  <!-- Security: upgrade-insecure-requests. HSTS must be set by server (not meta). -->
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
</head>

<body class="bg-white text-gray-900">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
