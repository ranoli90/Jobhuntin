# CI Pipeline – lint, type-check, test, build
#
# Runs on all PRs and pushes to main.
# On main: also builds Docker images and deploys to staging → production.
#
# Flow:
#   1. Quality gates (lint + type-check) run in parallel
#   2. Tests run after quality gates pass (with Postgres + Redis services)
#   3. Web build verified after tests pass
#   4. Docker images built and pushed to GHCR (main only)
#   5. Deploy to staging with smoke tests (main only)
#   6. Manual approval → promote to production (main only)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight CI runs for the same branch/PR to save resources
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Lint (backend) ─────────────────────────────────────────────
  lint-backend:
    name: 🐍 Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt
      - run: pip install ruff
      - name: Run Ruff linter
        run: ruff check . --select E,W,F,I --ignore E501,E402

  # ── Lint (web) ──────────────────────────────────────────────
  lint-web:
    name: 🌐 Lint Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ── Lint (web-admin) ───────────────────────────────────────
  lint-web-admin:
    name: 🛠 Lint Admin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web-admin/package-lock.json
      - run: npm ci
      - name: TypeScript type-check
        run: npx tsc --noEmit

  # ── Lint (extension) ───────────────────────────────────────
  lint-extension:
    name: 🧩 Lint Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/extension/package-lock.json
      - run: npm ci
      - name: Build extension
        run: npm run build

  # ── Backend Tests ──────────────────────────────────────────────
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    needs: [lint-backend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sorce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements*.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov psycopg2-binary
      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sorce_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          # Create stub auth schema for testing without Supabase
          psql "$DATABASE_URL" -c "CREATE SCHEMA IF NOT EXISTS auth;"
          psql "$DATABASE_URL" -c "CREATE TABLE IF NOT EXISTS auth.users (id uuid PRIMARY KEY);"
          psql "$DATABASE_URL" -c "CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid AS \$\$ SELECT '00000000-0000-0000-0000-000000000000'::uuid; \$\$ LANGUAGE sql;"
          psql "$DATABASE_URL" -c "DO \$\$ BEGIN CREATE PUBLICATION supabase_realtime; EXCEPTION WHEN OTHERS THEN END; \$\$;"
          
          # Run Alembic migrations — fail the build if migrations are broken
          pip install alembic
          alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sorce_test
          REDIS_URL: redis://localhost:6379/0
          ENV: local
          LLM_API_KEY: test-key
          SUPABASE_JWT_SECRET: test-secret
        run: pytest tests/ -v --tb=short --cov=apps --cov=packages --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Test Summary
        if: always()
        run: |
          echo "## 🧪 Backend Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Python:** ${{ env.PYTHON_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Database:** PostgreSQL 16" >> $GITHUB_STEP_SUMMARY
          echo "- **Cache:** Redis 7" >> $GITHUB_STEP_SUMMARY

  # ── Web Build Verification ──────────────────────────────────────
  build-web:
    name: 📦 Build Web
    runs-on: ubuntu-latest
    needs: [lint-web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production
      - name: Report bundle size
        run: |
          echo "## 📦 Web Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find dist/assets -name '*.js' -exec sh -c 'echo "| $(basename {}) | $(du -h {} | cut -f1) |"' \; >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "| (no JS bundles found) | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(du -sh dist/ 2>/dev/null | cut -f1 || echo "N/A")
          echo "**Total dist size:** $TOTAL" >> $GITHUB_STEP_SUMMARY

  # ── E2E Tests (Playwright) ─────────────────────────────────────
  e2e:
    name: 🎭 E2E Tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-web]
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        continue-on-error: true
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ── Build Docker images (main only) ────────────────────────────
  build-docker:
    name: 🐳 Build Docker (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [test-backend, build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [api, worker]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.target }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging (main only) ────────────────────────────
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - name: Deploy API to staging
        run: |
          curl -sf -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_STAGING_API_ID }}/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -d '{"clearCache": true}'
      - name: Wait for staging health
        run: |
          echo "Waiting 60s for deployment to start..."
          sleep 60
          
          for i in {1..20}; do
            if curl -sf https://jobhuntin-api-staging.onrender.com/healthz > /dev/null 2>&1; then
              echo "✅ Staging API is healthy!"
              exit 0
            fi
            echo "⏳ Waiting… attempt $i/20"
            sleep 15
          done
          
          echo "::error::Staging API health check timed out after 5 minutes"
          exit 1
      - name: Smoke test staging
        run: |
          echo "## 🏥 Staging Smoke Tests" >> $GITHUB_STEP_SUMMARY
          
          # Health endpoint
          HEALTH=$(curl -sf https://jobhuntin-api-staging.onrender.com/healthz)
          echo "- ✅ /healthz responded" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Response:** \`$HEALTH\`" >> $GITHUB_STEP_SUMMARY

  # ── Promote to production (manual approval) ──────────────────
  deploy-prod:
    name: 🏁 Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Deploy API to production
        run: |
          curl -sf -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_API_SERVICE_ID }}/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -d '{"clearCache": true}'
      - name: Deploy Worker to production
        run: |
          curl -sf -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_WORKER_SERVICE_ID }}/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -d '{"clearCache": true}'
      - name: Wait and smoke test production
        run: |
          echo "Waiting 90s for production deployment..."
          sleep 90
          
          for i in {1..20}; do
            if curl -sf https://sorce-api.onrender.com/healthz > /dev/null 2>&1; then
              echo "✅ Production API is healthy!"
              echo "## 🏁 Production Deployment" >> $GITHUB_STEP_SUMMARY
              echo "- ✅ API healthy" >> $GITHUB_STEP_SUMMARY
              echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
              echo "- **Deployed:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "⏳ Waiting… attempt $i/20"
            sleep 15
          done
          
          echo "::error::Production API health check failed"
          exit 1
