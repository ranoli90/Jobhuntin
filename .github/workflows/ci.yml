# Part 4: CI/CD Pipeline – lint, test, build, deploy
#
# Staging-to-prod promotion:
#   1. Push to main → lint + test against staging DB
#   2. Build Docker images for api + worker
#   3. Deploy to staging, run smoke tests
#   4. Manual approval → promote to prod

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Lint (backend) ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check . --select E,W,F,I

  # ── Lint (web) ──────────────────────────────────────────────
  lint-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Lint (web-admin) ───────────────────────────────────────
  lint-web-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web-admin/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Lint (extension) ───────────────────────────────────────
  lint-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/extension/package-lock.json
      - run: npm ci
      - run: npm run build

  # ── Test ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: [lint, lint-web, lint-web-admin, lint-extension]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sorce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest pytest-asyncio
      - run: python -m playwright install --with-deps chromium
      - name: Apply migrations (Alembic)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sorce_test
        run: |
          # Create stub auth schema for testing without Supabase
          psql "$DATABASE_URL" -c "CREATE SCHEMA IF NOT EXISTS auth; CREATE TABLE IF NOT EXISTS auth.users (id uuid PRIMARY KEY);"
          # Stub auth.uid() function
          psql "$DATABASE_URL" -c "CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid AS \$\$ SELECT '00000000-0000-0000-0000-000000000000'::uuid; \$\$ LANGUAGE sql;"
          # Stub supabase_realtime publication
          psql "$DATABASE_URL" -c "CREATE PUBLICATION IF NOT EXISTS supabase_realtime;"
          
          # Run Alembic migrations
          alembic upgrade head
      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sorce_test
          ENV: local
          LLM_API_KEY: test-key
          SUPABASE_JWT_SECRET: test-secret
        run: pytest tests/ -v -s --tb=short

  # ── Test (mobile) ──────────────────────────────────────────────
  # TODO: Re-enable when mobile app is ready (needs package-lock.json)
  # test-mobile:
  #   runs-on: ubuntu-latest
  #   needs: lint-mobile
  #   defaults:
  #     run:
  #       working-directory: mobile
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #         cache: npm
  #         cache-dependency-path: mobile/package-lock.json
  #     - run: npm ci
  #     - run: npx jest --passWithNoTests --ci

  # ── Build Docker images ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [api, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${{ github.sha }}

  # ── Deploy to staging ────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Deploy API to staging
        run: |
          curl -X POST "https://api.render.com/v1/services/srv-XXXXXX/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -d '{"clearCache": true}'
          # Replace srv-XXXXXX with actual Render API service ID
      - name: Deploy Worker to staging
        run: |
          curl -X POST "https://api.render.com/v1/services/srv-YYYYYY/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -d '{"clearCache": true}'
          # Replace srv-YYYYYY with actual Render Worker service ID
      - name: Smoke test staging
        run: |
          # Basic health check against staging API
          curl -sf https://api-staging.sorce.app/healthz || exit 1

  # ── Promote to production (manual gate) ──────────────────────
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy API to prod
        run: |
          curl -X POST "https://api.render.com/v1/services/srv-AAAAAA/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -d '{"clearCache": true}'
          # Replace srv-AAAAAA with actual Render API service ID
      - name: Deploy Worker to prod
        run: |
          curl -X POST "https://api.render.com/v1/services/srv-BBBBBB/deploys" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -d '{"clearCache": true}'
          # Replace srv-BBBBBB with actual Render Worker service ID
      - name: Smoke test prod
        run: |
          curl -sf https://api.sorce.app/healthz || exit 1
