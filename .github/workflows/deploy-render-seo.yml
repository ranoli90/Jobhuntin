# Deploy to Render with SEO Engine
#
# Deploys:
#   1. Web app (static site on Render)
#   2. SEO worker service
#   3. Verifies deployment health
#   4. Updates environment variables if needed

name: Deploy to Render with SEO Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one SEO deploy at a time
concurrency:
  group: seo-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  deploy-web:
    name: 🌐 Deploy Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build web app
        working-directory: apps/web
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Render
        run: |
          curl -sf -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_WEB_SERVICE_ID }}/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -d '{"clearCache": "true"}'
          
          echo "✅ Web app deployment triggered"

  deploy-seo-worker:
    name: 🔍 Deploy SEO Worker
    runs-on: ubuntu-latest
    needs: deploy-web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy SEO Worker to Render
        run: |
          curl -sf -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SEO_WORKER_ID }}/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -d '{"clearCache": "true"}'
          
          echo "🚀 SEO Ranking Engine deployment triggered"

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting 45s for deployment to start..."
          sleep 45
          
          RESPONSE=$(curl -sf -X GET \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SEO_WORKER_ID }}/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}")
          
          STATUS=$(echo "$RESPONSE" | jq -r 'if type == "array" then .[0].status // .[0].deploy.status else .status // .deploy.status // "unknown" end')
          echo "Deployment status: $STATUS"

  verify-deployment:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-seo-worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Verify SEO Engine Status
        working-directory: apps/web
        run: |
          echo "🔍 Verifying SEO engine deployment..."
          sleep 60
          timeout 30s npm run seo:verify || echo "⚠️ Verification timeout — service may still be starting"
          echo "✅ Deployment verification complete"

      - name: Test SEO Health Endpoint
        run: |
          echo "🏥 Testing SEO health endpoint..."
          curl -sf "https://jobhuntin.com/api/seo-health" || echo "⚠️ Health endpoint not yet available"
          echo "✅ Health check complete"

      - name: Summary
        run: |
          echo "## 🔍 SEO Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Web app:** Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **SEO worker:** Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Verification:** Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

  update-environment:
    name: 🔧 Update Env Vars
    runs-on: ubuntu-latest
    needs: deploy-web
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Set SEO Environment Variables
        run: |
          echo "🔧 Setting up SEO environment variables..."
          
          if [ -n "${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}" ]; then
            curl -sf -X PATCH \
              "https://api.render.com/v1/services/${{ secrets.RENDER_WEB_SERVICE_ID }}/env-vars" \
              -H "Accept: application/json" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{
                "envVars": [
                  {
                    "key": "GOOGLE_SERVICE_ACCOUNT_KEY",
                    "value": "'"${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}"'"
                  },
                  {
                    "key": "GOOGLE_SEARCH_CONSOLE_SITE",
                    "value": "https://jobhuntin.com"
                  }
                ]
              }'
            
            echo "✅ SEO environment variables set"
          else
            echo "⚠️ GOOGLE_SERVICE_ACCOUNT_KEY secret not found — skipping"
          fi

# Required Secrets:
#   RENDER_API_TOKEN           – Render API token
#   RENDER_WEB_SERVICE_ID      – Render service ID for the web app
#   RENDER_SEO_WORKER_ID       – Render service ID for the SEO worker
#   GOOGLE_SERVICE_ACCOUNT_KEY – Google service account JSON (optional)