# Optional: Local SonarQube Community Edition
# Usage: docker compose -f docker/sonarqube.yml up -d
# Access: http://localhost:9000 (admin/admin)
# Then create a project and token, set SONAR_HOST_URL and SONAR_TOKEN in .env

version: "3.9"

services:
  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
