# SonarQube / SonarCloud configuration for Sorce monorepo
# Used by: npm run sonar, .github/workflows/sonar.yml

sonar.organization=${SONAR_ORGANIZATION}
sonar.projectKey=${SONAR_PROJECT_KEY:-sorce-monorepo}

sonar.sources=apps,packages,shared
sonar.exclusions=**/node_modules/**,**/.venv/**,**/__pycache__/**,**/dist/**,**/build/**,**/*.test.ts,**/*.test.tsx,**/tests/**

sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

sonar.sourceEncoding=UTF-8
