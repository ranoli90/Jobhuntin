# SonarQube / SonarCloud Configuration
# =====================================
# Add your credentials before running a scan:
#   - For SonarCloud: Set SONAR_TOKEN in .env (create from https://sonarcloud.io/account/security)
#   - For SonarQube Server: Set SONAR_HOST_URL and SONAR_TOKEN in .env
#
# Required for SonarCloud:
#   sonar.organization=<your-org-key>
#   sonar.projectKey=<your-project-key>
#
# Run scan: npm run sonar

# Project identification
sonar.projectKey=ranoli90_sorce
sonar.projectName=sorce-monorepo

# SonarCloud organization (load from .env: SONAR_ORGANIZATION, SONAR_PROJECT_KEY, SONAR_TOKEN)
sonar.organization=ranoli90

# SonarCloud server URL
sonar.host.url=https://sonarcloud.io

# Sources - monorepo: web, admin, extension, mobile, backend, packages
sonar.sources=apps,api,api_v2,backend,blueprints,docs,infra,investor-data-room,investor-metrics,jobhuntin-e2e-tests,migrations,mobile,packages,partners,public,scripts,shared,supabase,templates,tests,worker

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/__pycache__/**,**/.venv/**,**/venv/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/playwright-report/**,**/test-results/**

# Test sources (for coverage)
sonar.tests=apps,api,api_v2,backend,jobhuntin-e2e-tests,mobile,packages,tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test_*.py,**/*test*.py

# JavaScript/TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info,apps/web/coverage/lcov.info

# Python
sonar.python.version=3.11,3.12

# Encoding
sonar.sourceEncoding=UTF-8

# JavaScript/TypeScript memory
sonar.javascript.node.maxspace=4096

# TypeScript/JavaScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info,apps/web/coverage/lcov.info,apps/web-admin/coverage/lcov.info

# Python coverage
sonar.python.coveragePlugin=coverage
sonar.coverage.javascript.reportsPath=coverage
sonar.coverage.python.paths=tests

# Suppress known false positive rules
# S5655: redis incr type mismatch (false positive with redis-py)
# S930: function arguments - many false positives with complex type inference
sonar.issue.ignore.rules=python:S5655,python:S930
