# SonarQube / SonarCloud Configuration
# =====================================
# Add your credentials before running a scan:
#   - For SonarCloud: Set SONAR_TOKEN in .env (create from https://sonarcloud.io/account/security)
#   - For SonarQube Server: Set SONAR_HOST_URL and SONAR_TOKEN in .env
#
# Required for SonarCloud:
#   sonar.organization=<your-org-key>
#   sonar.projectKey=<your-project-key>
#
# Run scan: npm run sonar

# Project identification
sonar.projectKey=ranoli90_sorce
sonar.projectName=sorce-monorepo

# SonarCloud organization (load from .env: SONAR_ORGANIZATION, SONAR_PROJECT_KEY, SONAR_TOKEN)
sonar.organization=ranoli90

# Sources - monorepo: web, admin, extension, mobile, backend, packages
sonar.sources=apps/web/src,apps/web-admin/src,apps/extension/src,mobile/src,jobhuntin-e2e-tests/src,backend,packages/backend,packages/shared

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/__pycache__/**,**/.venv/**,**/venv/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/playwright-report/**,**/test-results/**

# Test sources (for coverage)
sonar.tests=apps/web/src/tests,jobhuntin-e2e-tests/src,tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test_*.py

# JavaScript/TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info,apps/web/coverage/lcov.info

# Python
sonar.python.version=3.11,3.12

# Encoding
sonar.sourceEncoding=UTF-8
